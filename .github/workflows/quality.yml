name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: TypeScript
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Unit tests and coverage
        run: bun run test:coverage
      - name: Upload coverage evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
      - name: SEO policy
        run: bun run seo:check
      - name: Accessibility policy
        run: bun run accessibility:check
      - name: Catalogue content health
        run: bun run content:health
      - name: Server-only boundaries
        run: bun run security:boundaries
      - name: CI contract
        run: bun run ci:contract
      - name: Schema contract
        run: bun run schema:contract
      - name: Sensitive data contract
        run: bun run sensitive-data:contract
      - name: Dependency audit
        run: bun run audit:dependencies
      - name: Production build
        run: bun run build
      - name: Bundle budget
        run: bun run performance:budget

  rls-integration:
    if: ${{ vars.RLS_TESTS_REQUIRED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: RLS integration tests
        run: bun run test:integration:rls
        env:
          SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_TEST_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_TEST_PUBLISHABLE_KEY }}
          SUPABASE_TEST_USER_A_TOKEN: ${{ secrets.SUPABASE_TEST_USER_A_TOKEN }}
          SUPABASE_TEST_USER_B_TOKEN: ${{ secrets.SUPABASE_TEST_USER_B_TOKEN }}
          SUPABASE_TEST_USER_A_ID: ${{ secrets.SUPABASE_TEST_USER_A_ID }}
          SUPABASE_TEST_USER_B_ID: ${{ secrets.SUPABASE_TEST_USER_B_ID }}
          SUPABASE_TEST_ADMIN_TOKEN: ${{ secrets.SUPABASE_TEST_ADMIN_TOKEN }}
          SUPABASE_TEST_INSTITUTION_TOKEN: ${{ secrets.SUPABASE_TEST_INSTITUTION_TOKEN }}
